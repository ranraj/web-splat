<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>web-splat</title>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/normalize.css@8/normalize.css">
    <style>
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: black;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            touch-action: none;
            /* Prevent default touch behaviors like scrolling and zooming */
            -webkit-touch-callout: none;
            /* Disable callout on iOS */
            -webkit-user-select: none;
            /* Disable selection on iOS */
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #spinner {
            position: absolute;
            top: calc(50% - 48px);
            left: calc(50% - 48px);
            z-index: 1000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #spinner p {
            opacity: 0.5;
            font-size: small;
        }

        .loader {
            width: 96px;
            height: 96px;
            display: inline-block;
            position: relative;
        }

        .loader::after,
        .loader::before {
            content: '';
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #FFF;
            position: absolute;
            left: 0;
            top: 0;
            animation: animloader 2s linear infinite;
        }

        .loader::after {
            animation-delay: 1s;
        }

        @keyframes animloader {
            0% {
                transform: scale(0);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        svg {
            width: 114px;
            height: 114px;
            margin: 1em;
        }

        .bg {
            fill: none;
            stroke-width: 10px;
            stroke: #1A2C34;
        }

        [class^="meter-"] {
            fill: none;
            stroke-width: 5px;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;

        }

        .meter-1 {
            stroke-dasharray: 360;
            stroke-dashoffset: 360;
            stroke: white;
            animation: progress-1 1s ease-out;
        }

        .alert {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
        }

        .uploader {
            width: min(90vw, 520px);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 16px;
            margin-top: 16px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .uploader label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 0.9rem;
            opacity: 0.95;
        }

        .uploader input[type="file"] {
            color: white;
        }

        .uploader button {
            appearance: none;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 14px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .uploader button:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        .uploader-help {
            margin: 0;
            font-size: 0.82rem;
            opacity: 0.7;
        }

        canvas {
            touch-action: none;
            /* Prevent default touch behaviors */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
    <style>
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 64px;
            background: #111111cc;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 2000;
            border-bottom: 1px solid #2226;
            padding: 0 32px;
            box-sizing: border-box;
            font-family: Inter, Arial, Helvetica, sans-serif;
            backdrop-filter: blur(8px);
        }
        .navbar-left {
            display: flex;
            align-items: center;
            gap: 18px;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .navbar-center {
            font-size: 1rem;
            opacity: 0.8;
        }
        .navbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .navbar-uploader {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .navbar-uploader label {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-right: 4px;
        }
        .navbar-uploader input[type="file"] {
            color: white;
            background: none;
            border: none;
            font-size: 0.95rem;
        }
        .navbar-uploader button {
            appearance: none;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            background: rgba(59,130,246,0.15);
            color: #fff;
            padding: 7px 14px;
            font-size: 0.95rem;
            cursor: pointer;
            margin-left: 4px;
            transition: background 0.15s;
        }
        .navbar-uploader button:hover {
            background: rgba(59,130,246,0.28);
        }
        .try-demo-wrapper {
            position: relative;
            display: inline-block;
        }
        .try-demo-btn {
            appearance: none;
            border: 1px solid rgba(59,130,246,0.5);
            border-radius: 8px;
            background: rgba(59,130,246,0.18);
            color: #fff;
            padding: 7px 14px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .try-demo-btn:hover {
            background: rgba(59,130,246,0.35);
        }
        .demo-dropdown {
            display: none;
            position: absolute;
            top: 110%;
            right: 0;
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            min-width: 320px;
            z-index: 3000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            padding: 6px 0;
        }
        .demo-dropdown.open { display: block; }
        .demo-dropdown button {
            display: block;
            width: 100%;
            text-align: left;
            appearance: none;
            border: none;
            background: none;
            color: #fff;
            padding: 10px 16px;
            font-size: 0.92rem;
            cursor: pointer;
        }
        .demo-dropdown button:hover {
            background: rgba(255,255,255,0.08);
        }
        body {
            padding-top: 64px;
        }
        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                height: auto;
                padding: 8px 8px;
                gap: 8px;
            }
            body {
                padding-top: 90px;
            }
        }
    </style>

    <div class="navbar">
        <div class="navbar-left">
            <span style="font-weight:700;letter-spacing:1px;">VirtualBhoomi Studio</span>
            <span style="font-size:0.95rem;font-weight:400;opacity:0.7;">Demo Project</span>
            <div class="try-demo-wrapper">
                <button class="try-demo-btn" id="try-demo-btn">Try Demo ▾</button>
                <div class="demo-dropdown" id="demo-dropdown">
                    <button data-demo="rustic_kitchen_with_natural_light_2m.ply">🍳 Rustic Kitchen</button>
                    <button data-demo="elegant_library_with_fireplace_2m.ply">📚 Elegant Library</button>
                    <button data-demo="warm_traditional_kitchen_interior_2m.ply">🏠 Warm Traditional Kitchen</button>
                </div>
            </div>
        </div>
        <div class="navbar-center" id="navbar-status">Ready</div>
        <div class="navbar-right">
            <form class="navbar-uploader" id="navbar-uploader" onsubmit="return false;">
                <label>Point cloud
                    <input id="nav-pc-upload" type="file" accept=".ply,.npz,.spz" />
                </label>
                <label>Scene
                    <input id="nav-scene-upload" type="file" accept=".json,application/json" />
                </label>
                <button id="nav-render-upload" type="button">Render</button>
            </form>
        </div>
    </div>

    <div id="spinner" style="display: none;">
        <svg>
            <circle class="bg" cx="57" cy="57" r="52" />
            <circle class="meter-1" cx="57" cy="57" r="52" />
            <text id="loading-display" fill="white" x="50%" y="50%" text-anchor="middle"
                alignment-baseline="middle">10%</text>
        </svg>
    </div>
    <div id="no-file" class="alert" style="display: none;">
        <h1>No file specified</h1>
        <p>Use URL query params or choose local files above.</p>
        <div class="uploader" style="display:none;">
            <!-- Uploader moved to navbar -->
        </div>
    </div>
    <div id="no-webgpu" class="alert" style="display: none;">
        <h1>WebGPU not supported</h1>
        <p>Your browser does not support WebGPU.<br><a
                href="https://developer.mozilla.org/en-US/docs/Web/API/WebGPU_API#browser_compatibility">Please use a
                browser that supports WebGPU.</a></p>
    </div>
    <div id="loading-error" class="alert" style="display: none;">
        <h1>An error occured</h1>
        <p></p>
    </div>
</head>

<body>
    <script type="module">

        async function checkWebGPU() {
            if (!navigator.gpu) {
                return false;
            }
            try {
                let adapter = await navigator.gpu.requestAdapter()
                let device = await adapter.requestDevice();
                return true
            } catch (e) {
                return false;
            }
        }

        if (!await checkWebGPU()) {
            document.getElementById("no-webgpu").style.display = "flex";
            throw Error("WebGPU not supported.");
        }

        import init, { run_wasm, reload_pc_wasm } from "./web_splats.js";
        let init_promise = init();
        // Tracks whether a first render has been started.
        // On subsequent uploads we call reload_pc_wasm() instead of run_wasm()
        // because WASM only supports one EventLoop per page lifetime.
        let renderActive = false;

        let params = new URLSearchParams(window.location.search);
        let scene_file = params.get("scene");
        let pc_file = params.get("file");


        function withProgress(response) {
            if (!response.ok) {
                throw new Error("Cannot download file", { cause: response });
            }
            const contentLength = response.headers.get('content-length') || 0;
            const total = parseInt(contentLength, 10);
            let loaded = 0;
            return new Response(
                new ReadableStream({
                    start(controller) {
                        const reader = response.body.getReader();

                        read();
                        function read() {
                            reader.read().then(({ done, value }) => {
                                if (done) {
                                    controller.close();
                                    return;
                                }
                                loaded += value.byteLength;
                                document.querySelector('.meter-1').style.strokeDashoffset = 360 - Math.round(loaded / total * 360);
                                document.querySelector('#loading-display').innerHTML = Math.round(loaded / (1024 * 1024) * 10) / 10 + " MB"
                                controller.enqueue(value);
                                read();
                            }).catch(error => {
                                console.error(error);
                                controller.error(error)
                            })
                        }
                    }
                })
            );
        }
        function getErrorText(e) {
            if (e && "cause" in e && e.cause && "statusText" in e.cause) {
                return `${e.message}: ${e.cause.statusText}`;
            }
            if (e && "message" in e) {
                return e.message;
            }
            return String(e);
        }

        function showError(e, fileName) {
            document.getElementById("spinner").style.display = "none";
            let errorPane = document.getElementById("loading-error");
            errorPane.style.display = "flex";
            errorPane.getElementsByTagName("p")[0].innerHTML = `${getErrorText(e)}<pre>${fileName || ""}</pre>`;
            console.error(e);
        }

        let handlersAttached = false;
        function attachWindowHandlers() {
            if (handlersAttached) return;
            handlersAttached = true;
            window.addEventListener('resize', function () {
                let canvas = document.getElementById("window-canvas");
                if (!canvas) {
                    return;
                }
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }, true);

            document.addEventListener('contextmenu', event => event.preventDefault());
        }

        // ── Demo sample loader ───────────────────────────────────────────────
        // Place sample .ply files in public/demos/ to make them available.
        const DEMO_BASE_URL = "demos/";

        async function loadDemoFile(filename) {
            const statusEl = document.getElementById("navbar-status");
            statusEl.textContent = "Downloading " + filename + "…";
            document.getElementById("spinner").style.display = "flex";
            document.getElementById("no-file").style.display = "none";
            document.getElementById("loading-error").style.display = "none";

            try {
                const url = DEMO_BASE_URL + encodeURIComponent(filename);
                const response = await fetch(url);
                if (!response.ok) throw new Error("Download failed: " + response.statusText);
                const data = new Uint8Array(await response.arrayBuffer());
                statusEl.textContent = "Rendering " + filename;
                await runWithData(data, null, filename, null);
                statusEl.textContent = filename;
            } catch (e) {
                showError(e, filename);
                statusEl.textContent = "Error";
            }
        }

        // Toggle dropdown & handle clicks
        {
            const btn = document.getElementById("try-demo-btn");
            const dd = document.getElementById("demo-dropdown");
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                dd.classList.toggle("open");
            });
            document.addEventListener("click", () => dd.classList.remove("open"));
            dd.addEventListener("click", (e) => {
                const target = e.target.closest("[data-demo]");
                if (!target) return;
                dd.classList.remove("open");
                loadDemoFile(target.dataset.demo);
            });
        }
        // ── End demo loader ──────────────────────────────────────────────────

        async function runWithData(pcData, sceneData, pcName, sceneName) {
            document.getElementById("loading-error").style.display = "none";
            document.getElementById("no-file").style.display = "none";

            if (renderActive) {
                // A render is already running — hot-reload the new file inside the
                // existing WASM event loop instead of starting a new one.
                reload_pc_wasm(pcData, sceneData || null);
                return;
            }

            // First render: start the WASM event loop.
            document.getElementById("spinner").style.display = "flex";
            await init_promise;
            run_wasm(pcData, sceneData, pcName || null, sceneName || null);
            renderActive = true;
            attachWindowHandlers();
        }

        async function setupLocalUpload() {
            let noFilePane = document.getElementById("no-file");
            let navUploader = document.getElementById("navbar-uploader");
            let renderButton = document.getElementById("nav-render-upload");
            let pcUpload = document.getElementById("nav-pc-upload");
            let sceneUpload = document.getElementById("nav-scene-upload");

            noFilePane.style.display = "flex";
            renderButton.addEventListener("click", async () => {
                let pcLocalFile = pcUpload.files && pcUpload.files[0];
                let sceneLocalFile = sceneUpload.files && sceneUpload.files[0];

                if (!pcLocalFile) {
                    showError(new Error("Please select a point cloud file (.ply, .npz, or .spz)."), "");
                    noFilePane.style.display = "flex";
                    return;
                }

                try {
                    let pcData = new Uint8Array(await pcLocalFile.arrayBuffer());
                    let sceneData = null;
                    if (sceneLocalFile) {
                        sceneData = new Uint8Array(await sceneLocalFile.arrayBuffer());
                    }
                    noFilePane.style.display = "none";
                    await runWithData(pcData, sceneData, pcLocalFile.name, sceneLocalFile ? sceneLocalFile.name : null);
                } catch (e) {
                    showError(e, pcLocalFile.name);
                    noFilePane.style.display = "flex";
                }
            });
        }

        if (!pc_file) {
            setupLocalUpload();
        } else {
            try {
                let pc_promise = fetch(pc_file).then(withProgress).then(response => response.arrayBuffer()).then(data => new Uint8Array(data));
                var scene_promise = Promise.resolve(null);
                if (scene_file) {
                    scene_promise = fetch(scene_file, {
                        headers: {
                            'Accept': 'application/json',
                        }
                    }).then(r => r.arrayBuffer()).then(data => new Uint8Array(data))
                }

                let [pc_data, scene_data] = await Promise.all([pc_promise, scene_promise]);
                await runWithData(pc_data, scene_data, pc_file, scene_file);
            } catch (e) {
                showError(e, pc_file);
            }
        }
    </script>

</body>

</html>
